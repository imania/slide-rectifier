<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slide Rectifier</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <p>Local Perspective Tool</p>
        <h1>Slide Rectifier</h1>
      </div>
      <div class="header-actions">
        <input id="fileInput" type="file" accept="image/*" hidden>
        <button id="sampleBtn" type="button" title="Load sample image">Sample</button>
        <button id="openBtn" type="button" title="Open image">Open</button>
        <button id="pasteBtn" type="button" title="Paste image from clipboard">Paste</button>
        <button id="captureBtn" type="button" title="Capture screen">Capture</button>
        <button id="resetBtn" type="button" title="Reset workspace">Reset</button>
      </div>
    </header>

    <main class="workspace">
      <section class="source-panel" aria-label="Source">
        <div class="panel-head">
          <div>
            <h2>Source</h2>
            <p id="sourceMeta">No image</p>
          </div>
          <div class="status" id="statusText">Load an image to begin.</div>
        </div>
        <div class="canvas-frame source-frame">
          <canvas id="sourceCanvas" aria-label="Source image selection area"></canvas>
        </div>
      </section>

      <aside class="tool-panel" aria-label="Tools">
        <section class="controls">
          <h2>Selection</h2>
          <div class="point-list" id="pointList"></div>
          <div class="button-row">
            <button id="clearPointsBtn" type="button">Clear Points</button>
            <button id="autoFrameBtn" type="button">Default Frame</button>
          </div>
        </section>

        <section class="controls">
          <h2>Output</h2>
          <label>
            <span>Aspect Ratio</span>
            <select id="aspectMode">
              <option value="auto">Auto</option>
              <option value="16:9">16:9</option>
              <option value="4:3">4:3</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <div class="size-grid">
            <label>
              <span>Width</span>
              <input id="outputWidth" type="number" min="64" max="5000" step="1">
            </label>
            <label>
              <span>Height</span>
              <input id="outputHeight" type="number" min="64" max="5000" step="1">
            </label>
          </div>
          <div class="button-row">
            <button id="rectifyBtn" class="primary" type="button">Rectify</button>
            <button id="downloadBtn" type="button" disabled>Save PNG</button>
          </div>
        </section>

        <section class="result-panel" aria-label="Result">
          <div class="panel-head compact">
            <h2>Result</h2>
            <span id="resultMeta">Waiting</span>
          </div>
          <div class="canvas-frame result-frame">
            <canvas id="resultCanvas" aria-label="Rectified image result"></canvas>
          </div>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
